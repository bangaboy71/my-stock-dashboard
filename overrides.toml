# overrides.toml — 가족 자산 관제탑 로컬 설정
# ─────────────────────────────────────────────────────────────────
# 우선순위: secrets.toml > 구글 시트 snapshot > 이 파일 > 코드 기본값
#
# 용도
#   - 인터넷 없는 로컬 환경에서 구글 시트 없이도 실행 가능하게 함
#   - 구글 시트에 아직 입력하지 않은 날짜의 수치를 임시 보관
#
# ⚠️ .gitignore 에 추가 권장 (개인 수치 포함)
# ─────────────────────────────────────────────────────────────────

[app]
# KOSPI 상대 수익률 비교 기준일
kospi_base_date = "2026-03-03"


# ── 날짜별 팩트 스냅샷 ────────────────────────────────────────────
# 구글 시트 snapshot 워크시트와 동일한 역할.
# 시트에 데이터가 있으면 시트가 우선 적용됩니다.
#
# 추가 방법: [snapshots."YYYY-MM-DD"] 섹션을 복사해서 날짜만 바꿔 사용

[snapshots."2026-03-09"]
KOSPI                          = 5251.87
삼성전자                       = 111400.0
KODEX200타겟위클리커버드콜     = 16515.0
# 나머지 종목은 현재가로 자동 폴백됩니다.
# 아래 종목 추가 시 주석 해제 후 실제 값 입력
# KT&G                         = 0.0
# 테스                         = 0.0
